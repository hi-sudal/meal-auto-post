name: Render Meal Image

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install sharp
        run: |
          npm init -y
          npm i sharp

      - name: Render PNG (no image.svg needed)
        run: |
          node <<'NODE'
          const fs = require("fs");
          const sharp = require("sharp");

          const W = 1080, H = 1080;

          const svg = `
          <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
            <rect width="100%" height="100%" fill="#212224"/>
            <text x="60" y="70" fill="#F5F5F5"
              font-family="DejaVu Sans" font-size="56">Feb 2 [Breakfast]</text>

            <text x="60" y="190" fill="#F5F5F5"
              font-family="DejaVu Sans" font-size="44">Rice</text>
            <text x="60" y="252" fill="#F5F5F5"
              font-family="DejaVu Sans" font-size="44">Beef radish soup</text>

            <text x="60" y="980" fill="#F5F5F5"
              font-family="DejaVu Sans" font-size="46">2026.02.02</text>
          </svg>`.trim();

          fs.mkdirSync("output", { recursive: true });

          sharp(Buffer.from(svg))
            .png()
            .toFile("output/example.png")
            .then(() => console.log("saved output/example.png"))
            .catch((e) => { console.error(e); process.exit(1); });
          NODE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: meal-image
          path: output/example.png
