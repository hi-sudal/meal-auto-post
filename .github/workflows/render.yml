name: Render Tomorrow Meal (Test)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install fontconfig + register font
        run: |
          sudo apt-get update
          sudo apt-get install -y fontconfig

          mkdir -p ~/.local/share/fonts
          cp NotoSansKR-Regular.ttf ~/.local/share/fonts/
          fc-cache -f

      - name: Install dependencies
        run: |
          npm init -y
          npm i sharp axios

      - name: Render Tomorrow Meal Image
        run: |
          node <<'NODE'
          const fs = require("fs");
          const sharp = require("sharp");
          const axios = require("axios");

          const NEIS_KEY = "967c5ea2dcd94832b604e3eb2f4ff8eb";
          const ATPT = "Q10";
          const SCHOOL = "8490081";
          const MMEAL = "2"; // 중식

          const W = 1080, H = 1080;
          const BG = "#212224";
          const FG = "#F5F5F5";

          const x = 60;
          const titleY = 70;
          const bodyStartY = 190;
          const lineStep = 62;
          const dateY = 1000;

          function tomorrowKST() {
            const now = new Date();
            const utc = now.getTime() + now.getTimezoneOffset() * 60000;
            const kst = new Date(utc + 9 * 60 * 60 * 1000);
            kst.setDate(kst.getDate() + 1);
            return kst;
          }

          function ymd(d) {
            return d.toISOString().slice(0,10).replaceAll("-","");
          }

          function esc(s) {
            return s.replaceAll("&","&amp;")
                    .replaceAll("<","&lt;")
                    .replaceAll(">","&gt;");
          }

          async function fetchMeal(dateYMD) {
            const res = await axios.get(
              "https://open.neis.go.kr/hub/mealServiceDietInfo",
              {
                params: {
                  KEY: NEIS_KEY,
                  Type: "json",
                  ATPT_OFCDC_SC_CODE: ATPT,
                  SD_SCHUL_CODE: SCHOOL,
                  MLSV_YMD: dateYMD,
                  MMEAL_SC_CODE: MMEAL
                }
              }
            );

            const blocks = res.data.mealServiceDietInfo;
            if (!blocks) return ["급식 정보가 없습니다."];

            const rowBlock = blocks.find(b => b.row);
            if (!rowBlock) return ["급식 정보가 없습니다."];

            const dish = rowBlock.row[0].DDISH_NM;
            return dish.split(/<br\s*\/?>/i).map(v => v.trim());
          }

          (async () => {
            const t = tomorrowKST();
            const lines = await fetchMeal(ymd(t));

            const menuText = lines.map((line,i)=>{
              const yy = bodyStartY + i*lineStep;
              return `<text x="${x}" y="${yy}" class="body">${esc(line)}</text>`;
            }).join("\n");

            const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
              <style>
                .title { font-family: "Noto Sans KR", sans-serif; font-size: 56px; fill: ${FG}; }
                .body  { font-family: "Noto Sans KR", sans-serif; font-size: 44px; fill: ${FG}; }
                .date  { font-family: "Noto Sans KR", sans-serif; font-size: 46px; fill: ${FG}; }
              </style>
              <rect width="100%" height="100%" fill="${BG}"/>
              <text x="${x}" y="${titleY}" class="title">${t.getMonth()+1}월 ${t.getDate()}일 [급식]</text>
              ${menuText}
              <text x="${x}" y="${dateY}" class="date">${t.toISOString().slice(0,10)}</text>
            </svg>`;

            fs.mkdirSync("output",{recursive:true});
            await sharp(Buffer.from(svg)).png().toFile("output/tomorrow.png");
            console.log("saved output/tomorrow.png");
          })();
          NODE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tomorrow-meal
          path: output/tomorrow.png
