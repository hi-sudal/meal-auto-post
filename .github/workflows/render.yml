name: Post Tomorrow Meals to Instagram (Carousel)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *" # 매일 22:00 KST (UTC 13:00) :contentReference[oaicite:4]{index=4}

permissions:
  contents: write

jobs:
  build-and-post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install fontconfig + register font
        run: |
          sudo apt-get update
          sudo apt-get install -y fontconfig

          if [ ! -f "NotoSansKR-Regular.ttf" ]; then
            echo "ERROR: repo root에 NotoSansKR-Regular.ttf가 없습니다."
            exit 1
          fi

          mkdir -p ~/.local/share/fonts
          cp NotoSansKR-Regular.ttf ~/.local/share/fonts/
          fc-cache -f

      - name: Install dependencies
        run: |
          npm init -y
          npm i sharp axios

      - name: Render Tomorrow Meals (Breakfast/Lunch/Dinner) -> images/
        env:
          NEIS_KEY: ${{ secrets.NEIS_KEY }}
          ATPT: ${{ secrets.ATPT_OFCDC_SC_CODE }}
          SCHOOL: ${{ secrets.SD_SCHUL_CODE }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const sharp = require("sharp");
          const axios = require("axios");

          const NEIS_KEY = process.env.NEIS_KEY;
          const ATPT = process.env.ATPT;
          const SCHOOL = process.env.SCHOOL;

          if (!NEIS_KEY || !ATPT || !SCHOOL) {
            console.error("ERROR: NEIS Secrets(NEIS_KEY, ATPT_OFCDC_SC_CODE, SD_SCHUL_CODE) 확인 필요");
            process.exit(1);
          }

          // ====== 템플릿(완성본 값 유지: 필요 시 여기만 유지/조정) ======
          const W = 1080, H = 1080;
          const BG = "#1b1c1e";
          const FG = "#ffffff";

          const x = 60;
          const titleY = 130;
          const bodyStartY = 240;
          const lineStep = 62;
          const dateY = 1015;

          const TITLE_SIZE = 56;
          const BODY_SIZE  = 44;
          const DATE_SIZE  = 46;

          const MAX_LINES = 12;

          const esc = (s) =>
            String(s)
              .replaceAll("&","&amp;")
              .replaceAll("<","&lt;")
              .replaceAll(">","&gt;")
              .replaceAll('"',"&quot;")
              .replaceAll("'","&apos;");

          function nowKST() {
            const now = new Date();
            const utcMs = now.getTime() + now.getTimezoneOffset() * 60000;
            return new Date(utcMs + 9 * 60 * 60 * 1000);
          }
          function tomorrowKST() {
            const d = nowKST();
            d.setDate(d.getDate() + 1);
            return d;
          }
          function ymd(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            return `${y}${m}${d}`;
          }
          function dateISO(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, "0");
            const d = String(date.getDate()).padStart(2, "0");
            return `${y}-${m}-${d}`;
          }
          function titleText(date, label) {
            const mm = date.getMonth() + 1;
            const dd = date.getDate();
            return `${mm}월 ${dd}일 [${label}]`;
          }

          async function fetchMealLines(dateYMD, mmeal) {
            const res = await axios.get("https://open.neis.go.kr/hub/mealServiceDietInfo", {
              params: {
                KEY: NEIS_KEY,
                Type: "json",
                pIndex: 1,
                pSize: 100,
                ATPT_OFCDC_SC_CODE: ATPT,
                SD_SCHUL_CODE: SCHOOL,
                MLSV_YMD: dateYMD,
                MMEAL_SC_CODE: mmeal,
              },
              timeout: 30000
            });

            const blocks = res.data.mealServiceDietInfo;
            if (!blocks) return ["급식 정보가 없습니다."];

            const rowBlock = blocks.find(b => b.row);
            if (!rowBlock || !rowBlock.row || !rowBlock.row[0]) return ["급식 정보가 없습니다."];

            const dishRaw = rowBlock.row[0].DDISH_NM || "";
            if (!dishRaw.trim()) return ["급식 정보가 없습니다."];

            const lines = dishRaw
              .replace(/\r/g, "")
              .split(/<br\s*\/?>/i)
              .map(v => v.trim())
              .filter(Boolean);

            return lines.length ? lines : ["급식 정보가 없습니다."];
          }

          async function renderOne({ title, menuLines, dateStr, outPath }) {
            const safeLines = menuLines.slice(0, MAX_LINES);

            const menuText = safeLines.map((line, i) => {
              const yy = bodyStartY + i * lineStep;
              return `<text x="${x}" y="${yy}" class="body">${esc(line)}</text>`;
            }).join("\n");

            const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
              <style>
                .title { font-family: "Noto Sans KR", "Noto Sans CJK KR", sans-serif; font-size: ${TITLE_SIZE}px; fill: ${FG}; }
                .body  { font-family: "Noto Sans KR", "Noto Sans CJK KR", sans-serif; font-size: ${BODY_SIZE}px; fill: ${FG}; }
                .date  { font-family: "Noto Sans KR", "Noto Sans CJK KR", sans-serif; font-size: ${DATE_SIZE}px; fill: ${FG}; }
              </style>

              <rect width="100%" height="100%" fill="${BG}"/>
              <text x="${x}" y="${titleY}" class="title">${esc(title)}</text>
              ${menuText}
              <text x="${x}" y="${dateY}" class="date">${esc(dateStr)}</text>
            </svg>`.trim();

            await sharp(Buffer.from(svg)).png().toFile(outPath);
          }

          (async () => {
            const t = tomorrowKST();
            const dateYMD = ymd(t);
            const dateStr = dateISO(t);

            const imagesDir = "images";
            fs.mkdirSync(imagesDir, { recursive: true });

            const mealMap = [
              { mmeal: "1", label: "조식", file: "breakfast.png" },
              { mmeal: "2", label: "중식", file: "lunch.png" },
              { mmeal: "3", label: "석식", file: "dinner.png" },
            ];

            for (const m of mealMap) {
              const lines = await fetchMealLines(dateYMD, m.mmeal);
              const outPath = `${imagesDir}/${m.file}`;

              await renderOne({
                title: titleText(t, m.label),
                menuLines: lines,
                dateStr,
                outPath
              });

              console.log("saved", outPath);
            }
          })().catch((e) => {
            console.error(e);
            process.exit(1);
          });
          NODE

      - name: Commit and push images (stable URLs)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add images/
          git commit -m "chore: update tomorrow meals" || echo "No changes to commit"
          git push

      - name: Publish carousel to Instagram
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          node <<'NODE'
          const axios = require("axios");
          const { execSync } = require("child_process");

          const IG_USER_ID = process.env.IG_USER_ID;
          const IG_ACCESS_TOKEN = process.env.IG_ACCESS_TOKEN;
          const GITHUB_REPO = process.env.GITHUB_REPO; // owner/repo

          if (!IG_USER_ID || !IG_ACCESS_TOKEN) {
            console.error("ERROR: IG_USER_ID / IG_ACCESS_TOKEN Secrets가 필요합니다.");
            process.exit(1);
          }

          // 방금 push된 커밋 SHA를 기준으로 raw URL 생성(즉시 접근 가능)
          const sha = execSync("git rev-parse HEAD").toString().trim();

          const base = `https://raw.githubusercontent.com/${GITHUB_REPO}/${sha}/images`;
          const urls = [
            `${base}/breakfast.png`,
            `${base}/lunch.png`,
            `${base}/dinner.png`,
          ];

          const caption =
            "내일 급식 (조식/중식/석식)\n" +
            "#급식 #학교급식 #내일급식";

          async function createImageContainer(imageUrl) {
            const r = await axios.post(`https://graph.facebook.com/v19.0/${IG_USER_ID}/media`, null, {
              params: {
                image_url: imageUrl,          // 공개 URL 필요 :contentReference[oaicite:5]{index=5}
                is_carousel_item: true,
                access_token: IG_ACCESS_TOKEN
              },
              timeout: 30000
            });
            return r.data.id;
          }

          async function createCarouselContainer(children) {
            const r = await axios.post(`https://graph.facebook.com/v19.0/${IG_USER_ID}/media`, null, {
              params: {
                media_type: "CAROUSEL",
                children: children.join(","),
                caption,
                access_token: IG_ACCESS_TOKEN
              },
              timeout: 30000
            });
            return r.data.id;
          }

          async function publishContainer(creationId) {
            const r = await axios.post(`https://graph.facebook.com/v19.0/${IG_USER_ID}/media_publish`, null, {
              params: {
                creation_id: creationId,
                access_token: IG_ACCESS_TOKEN
              },
              timeout: 30000
            });
            return r.data;
          }

          (async () => {
            // 1) 각 이미지 컨테이너 생성
            const childIds = [];
            for (const u of urls) {
              const id = await createImageContainer(u);
              childIds.push(id);
            }

            // 2) 캐러셀 컨테이너 생성
            const carouselId = await createCarouselContainer(childIds);

            // 3) 게시
            const published = await publishContainer(carouselId);

            console.log("published:", published);
          })().catch(e => {
            console.error(e?.response?.data || e);
            process.exit(1);
          });
          NODE
