name: Render Tomorrow Meal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm init -y
          npm i sharp axios

      - name: Render Tomorrow Meal Image
        env:
          NEIS_KEY: ${{ secrets.NEIS_KEY }}
          ATPT: ${{ secrets.ATPT_OFCDC_SC_CODE }}
          SCHOOL: ${{ secrets.SD_SCHUL_CODE }}
        run: |
          node <<'NODE'
          const fs = require("fs");
          const sharp = require("sharp");
          const axios = require("axios");

          const W = 1080, H = 1080;

          function getTomorrowKST() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
            const kst = new Date(utc + (9 * 60 * 60 * 1000));
            kst.setDate(kst.getDate() + 1);
            return kst;
          }

          function formatYMD(date) {
            return date.toISOString().slice(0,10).replaceAll("-","");
          }

          function formatTitle(date) {
            return `${date.getMonth()+1}월 ${date.getDate()}일 [급식]`;
          }

          function formatDate(date) {
            return date.toISOString().slice(0,10);
          }

          async function fetchMeal(dateYMD) {
            const url = "https://open.neis.go.kr/hub/mealServiceDietInfo";
            const res = await axios.get(url, {
              params: {
                KEY: process.env.NEIS_KEY,
                Type: "json",
                ATPT_OFCDC_SC_CODE: process.env.ATPT,
                SD_SCHUL_CODE: process.env.SCHOOL,
                MLSV_YMD: dateYMD
              }
            });

            const blocks = res.data.mealServiceDietInfo;
            if (!blocks) return ["급식 정보가 없습니다."];

            const rowBlock = blocks.find(b => b.row);
            if (!rowBlock) return ["급식 정보가 없습니다."];

            const dish = rowBlock.row[0].DDISH_NM;
            return dish.replaceAll("<br/>","\n").split("\n");
          }

          (async () => {

            const tomorrow = getTomorrowKST();
            const ymd = formatYMD(tomorrow);

            const title = formatTitle(tomorrow);
            const dateStr = formatDate(tomorrow);
            const menuLines = await fetchMeal(ymd);

            const BG = "#212224";
            const FG = "#F5F5F5";

            const x = 60;
            const titleY = 70;
            const bodyStartY = 190;
            const lineStep = 62;
            const dateY = 1000;

            const esc = s =>
              s.replaceAll("&","&amp;")
               .replaceAll("<","&lt;")
               .replaceAll(">","&gt;");

            const menuText = menuLines.map((line,i)=>{
              const y = bodyStartY + i * lineStep;
              return `<text x="${x}" y="${y}" class="body">${esc(line)}</text>`;
            }).join("\n");

            const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}">
              <style>
                .title { font-family: "Noto Sans KR", sans-serif; font-size: 56px; fill: ${FG}; }
                .body  { font-family: "Noto Sans KR", sans-serif; font-size: 44px; fill: ${FG}; }
                .date  { font-family: "Noto Sans KR", sans-serif; font-size: 46px; fill: ${FG}; }
              </style>

              <rect width="100%" height="100%" fill="${BG}"/>

              <text x="${x}" y="${titleY}" class="title">${esc(title)}</text>

              ${menuText}

              <text x="${x}" y="${dateY}" class="date">${esc(dateStr)}</text>
            </svg>`;

            fs.mkdirSync("output",{recursive:true});

            await sharp(Buffer.from(svg))
              .png()
              .toFile("output/tomorrow.png");

            console.log("saved output/tomorrow.png");

          })().catch(e=>{
            console.error(e);
            process.exit(1);
          });
          NODE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tomorrow-meal
          path: output/tomorrow.png
